name: Update EasyTier

on:
  schedule:
    # 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-easytier
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update formula and cask from latest EasyTier release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby scripts/update-easytier-core.rb

      - name: Validate formula and cask
        run: |
          brew tap ly-wo/tap "$GITHUB_WORKSPACE"
          brew audit --strict --formula ly-wo/tap/easytier-core
          brew fetch --force --formula ly-wo/tap/easytier-core
          brew install --formula ly-wo/tap/easytier-core
          brew test ly-wo/tap/easytier-core
          brew audit --strict --cask ly-wo/tap/easytier-gui
          brew fetch --force --cask ly-wo/tap/easytier-gui
          brew install --cask ly-wo/tap/easytier-gui

      - name: Commit and push changes
        run: |
          if git diff --quiet -- Formula/easytier-core.rb Casks/easytier-gui.rb; then
            echo "No formula or cask changes."
            exit 0
          fi

          version="$(ruby -ne 'puts $1 if %r{/download/(v[^/]+)/} =~ $_' Formula/easytier-core.rb | head -n 1)"
          if [ -z "$version" ]; then
            echo "Could not determine easytier-core version from formula."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/easytier-core.rb Casks/easytier-gui.rb
          git commit -m "Update EasyTier to ${version}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
