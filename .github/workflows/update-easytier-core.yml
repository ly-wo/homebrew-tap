name: Update Homebrew packages

on:
  schedule:
    # 02:00 Asia/Shanghai.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-homebrew-packages
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update package definitions from latest releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ruby scripts/update-easytier-core.rb
          ruby scripts/update-github-casks.rb

      - name: Detect package changes
        id: changes
        run: |
          if git diff --quiet -- Formula Casks; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate formula
        if: steps.changes.outputs.changed == 'true'
        run: |
          brew tap ly-wo/tap "$GITHUB_WORKSPACE"
          brew audit --strict --formula ly-wo/tap/easytier-core
          brew fetch --force --formula ly-wo/tap/easytier-core
          brew install --formula ly-wo/tap/easytier-core
          brew test ly-wo/tap/easytier-core

      - name: Validate casks
        if: steps.changes.outputs.changed == 'true'
        run: |
          for cask in easytier-gui dms pakeplus ztools rubick tiny-rdm rustdesk; do
            brew audit --strict --cask "ly-wo/tap/${cask}"
            brew fetch --force --cask "ly-wo/tap/${cask}"
          done

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula Casks
          git commit -m "Update Homebrew packages"
          git push origin "HEAD:${GITHUB_REF_NAME}"
